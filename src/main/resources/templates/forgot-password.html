<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .container {
            width: 430px;
            margin: 80px auto;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            color: #1E3A8A;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            color: #555;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
        }

        input {
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            margin-top: 25px;
            padding: 13px;
            background: #FFB703;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #FB8500;
            color: white;
        }

        .error {
            color: red;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: #16A34A;
            text-align: center;
            font-weight: bold;
        }

        .link {
            text-align: center;
            margin-top: 18px;
        }

        a {
            color: #1E3A8A;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Forgot Password</h2>

    <p>Enter your registered email and new password.</p>

    <p class="error" th:text="${error}"></p>
    <p class="success" th:text="${success}"></p>

    <form action="/forgot-password" method="post">

        <label>Email</label>
        <input type="email" name="email" required>

        <label>New Password</label>
        <input type="password" name="newPassword" required>

        <button type="submit">Reset Password</button>

    </form>

    <div class="link">
        <a href="/login">Back to Login</a>
    </div>

</div>

</body>
</html>
